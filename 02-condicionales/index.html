<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form action="">
        <label for="verificar">Mayor de edad</label>
        <input type="number" id="edad" placeholder="Ingresa tu edad" name="verificar">
        <button id="btnVerificar">Verificar</button>
        <p id="resultado"></p>
        <br>
        <label for="dia">Día de la semana</label>
        <select id="dia" name="dia">
            <option value="lunes">Lunes</option>
            <option value="martes">Martes</option>
            <option value="miercoles">Miércoles</option>
            <option value="jueves">Jueves</option>
            <option value="viernes">Viernes</option>
            <option value="sabado">Sábado</option>
            <option value="domingo">Domingo</option>
        </select>
        <br>
        <button id="btnDia">Ver tipo de día</button>
        <p id="resultadoDia"></p>
        <br>
        
        <label for="raiz">Raíz</label>
        <input type="text" id="numero" placeholder="Ingresa un número" name="raiz">
        <button id="btnCalcular">Calcular raíz</button>
        <p id="resultadoRaiz"></p>
        <br>

    </form>

     <script src="js/ejercicio.js"></script>
</body>

</html>
